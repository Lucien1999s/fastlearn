<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fast-learning frontend</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
        color: #111827;
        background: #f3f4f6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      p {
        line-height: 1.6;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>fast-learning frontend</h1>
      <p>Frontend container is running.</p>
      <p>Backend default URL: <code>http://localhost:8000</code></p>
    </main>
  </body>
</html>
