services:
  backend:
    build:
      context: ./backend
    container_name: fast-learning-backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: fast-learning-frontend
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "3000:80"
    depends_on:
      - backend

